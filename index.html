<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vacation Hours Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #232526 0%, #414345 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.8;
            font-size: 1.1em;
        }

        .login-section {
            padding: 40px;
            text-align: center;
            background: #f8f9fa;
        }

        .input-group {
            max-width: 400px;
            margin: 0 auto;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
            font-size: 1.1em;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1em;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .results-section {
            padding: 40px;
            display: none;
        }

        .user-info {
            background: #e8f4fd;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-left: 5px solid #667eea;
        }

        .user-info h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .vacation-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .vacation-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: 600;
        }

        .vacation-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        .vacation-table th:nth-child(1),
        .vacation-table td:nth-child(1),
        .vacation-table th:nth-child(2),
        .vacation-table td:nth-child(2) {
            text-align: center;
        }

        .vacation-table tr:hover {
            background: #f8f9fa;
        }

        .vacation-table tr:nth-child(even) {
            background: #f9f9f9;
        }

        .hours-cell {
            font-weight: 600;
            color: #333;
        }

        .hours-low {
            background-color: #FFC7CE;
            color: #9C0006;
        }

        .hours-medium {
            background-color: #FFEB9C;
            color: #9C5700;
        }

        .hours-high {
            background-color: #C6EFCE;
            color: #006100;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            border-left: 5px solid #dc3545;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .week-cell {
            position: relative;
            cursor: pointer;
        }

        .week-tooltip {
            position: fixed;
            bottom: auto;
            top: auto;
            left: 50%;
            transform: translateX(-50%) translateY(-100%);
            background: #333;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85em;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
            z-index: 1001;
            margin-bottom: 5px;
            pointer-events: none;
        }

        .week-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: #333;
        }

        .week-cell:hover .week-tooltip,
        .week-cell:active .week-tooltip {
            opacity: 1;
            visibility: visible;
        }

        .table-container {
            overflow-x: auto;
            overflow-y: visible;
            -webkit-overflow-scrolling: touch;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 8px;
                font-size: 12px;
            }

            .container {
                border-radius: 8px;
            }

            .header {
                padding: 15px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .header p {
                font-size: 0.9em;
            }

            .login-section {
                padding: 15px;
            }

            .results-section {
                padding: 15px;
            }

            .vacation-table,
            .vacation-table th,
            .vacation-table td {
                font-size: 10px;
            }

            .vacation-table th,
            .vacation-table td {
                padding: 4px 2px;
            }

            .vacation-table th:nth-child(3),
            .vacation-table td:nth-child(3) {
                width: 20px;
                min-width: 20px;
            }

            .vacation-table th:nth-child(2),
            .vacation-table td:nth-child(2) {
                display: none;
            }

            .modal-content {
                margin: 2% auto;
                padding: 15px;
                width: 95%;
            }

            .upload-area {
                padding: 15px;
                margin: 10px 0;
            }

            .admin-btn {
                display: none;
            }

            .week-tooltip {
                font-size: 11px;
                padding: 4px 6px;
            }

            .btn {
                padding: 10px 16px;
                font-size: 12px;
            }

            .input-group input {
                padding: 10px;
                font-size: 12px;
            }

            .input-group label {
                font-size: 12px;
            }

            .user-info {
                padding: 15px;
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            .vacation-table th,
            .vacation-table td {
                padding: 6px 4px;
            }
        }

        /* Table scroll for very small screens */
        @media (max-width: 400px) {
            .vacation-table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
            }
        }

        /* Fix rounded corners on mobile */
        @media (max-width: 768px) {
            .vacation-table th:first-child {
                border-top-left-radius: 10px;
            }
            .vacation-table th:last-child {
                border-top-right-radius: 10px;
            }
            .vacation-table tr:last-child td:first-child {
                border-bottom-left-radius: 10px;
            }
            .vacation-table tr:last-child td:last-child {
                border-bottom-right-radius: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Semáforo de Vacaciones</h1>
            <p>Revisa la disponibilad de vacaciones por semana</p>
        </div>

        <div class="login-section" id="loginSection">
            <div class="input-group">
                <label for="loginInput">Ingrese su login:</label>
                <input type="text" id="loginInput" placeholder="Ingrese su login" autocomplete="off">
                <button class="btn" onclick="searchEmployee()">Buscar</button>
            </div>
        </div>

        <div class="results-section" id="resultsSection">
            <div class="user-info" id="userInfo"></div>
            <div id="vacationData"></div>
        </div>
    </div>



    <script>
        const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/changezaz1-web/vacation-tracker/main/datos.json';

        let employeeMapping = [];
        let vacationProjection = [];
        let lastUpdated = null;

        async function loadData() {
            try {
                const response = await fetch(`${GITHUB_RAW_URL}?v=${new Date().getTime()}`);
                if (!response.ok) throw new Error('No se pudo cargar los datos');
                const data = await response.json();
                employeeMapping = data.employee_mapping || [];
                vacationProjection = data.vacation_projection || [];
                lastUpdated = data.last_updated;
                updateLastUpdatedDisplay();
                console.log(`Data loaded: ${employeeMapping.length} employees, ${vacationProjection.length} vacation records`);
            } catch (error) {
                console.error('Error loading data:', error);
                showError('Error al cargar los datos.');
            }
        }

        function updateLastUpdatedDisplay() {
            if (lastUpdated) {
                const date = new Date(lastUpdated);
                const formattedDate = date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
                document.querySelector('.header p').innerHTML =
                    `Revisa la disponibilidad de vacaciones por semana<br><small style="opacity: 0.6;">Última actualización: ${formattedDate}</small>`;
            }
        }

        function searchEmployee() {
            const login = document.getElementById('loginInput').value.trim();
            if (!login) { showError('Por favor ingresa un login'); return; }
            if (employeeMapping.length === 0) { showError('Datos no cargados. Recarga la página.'); return; }

            showLoading();
            setTimeout(() => {
                const employee = employeeMapping.find(emp =>
                    emp.login && emp.login.toLowerCase() === login.toLowerCase()
                );
                if (!employee) { showError('Login no encontrado'); return; }
                displayResults(employee);
            }, 300);
        }

        function showLoading() {
            const s = document.getElementById('resultsSection');
            s.style.display = 'block';
            s.innerHTML = `<div class="loading"><div class="spinner"></div><p>Buscando...</p></div>`;
        }

        function showError(message) {
            const s = document.getElementById('resultsSection');
            s.style.display = 'block';
            s.innerHTML = `<div class="error-message"><strong>Error:</strong> ${message}</div>`;
        }

        function displayResults(employee) {
            const empArea  = (employee.area  || '').toUpperCase();
            const empTurno = (employee.turno || '').toUpperCase();

            const userInfo = `
                <h3>Información de Empleado</h3>
                <p><strong>Login:</strong> ${employee.login}</p>
                <p><strong>Área:</strong> ${empArea}</p>
            `;

            // Semana actual
            const wk1Start = new Date(2025, 11, 28);
            const today = new Date();
            const currentWeek = Math.floor((today - wk1Start) / (7 * 24 * 60 * 60 * 1000)) + 1;

            // Filtrar por área Y turno, excluyendo semanas pasadas
            const rowData = vacationProjection
                .filter(item =>
                    (item.Area  || '').toUpperCase() === empArea &&
                    (item.Turno || '').toUpperCase() === empTurno &&
                    (item.Week  || 0) >= currentWeek
                )
                .sort((a, b) => (a.Week || 0) - (b.Week || 0));

            if (rowData.length === 0) {
                showError(`No hay datos para el área ${empArea} y turno ${empTurno || 'desconocido'}`);
                return;
            }

            let tableHTML = `
                <table class="vacation-table">
                    <thead>
                        <tr>
                            <th>Semana</th>
                            <th>Disponibilidad</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            rowData.forEach(item => {
                const hours = item.Available_Hours || 0;
                const week  = item.Week  || 'N/A';
                const turno = item.Turno || empTurno;

                let hoursClass, status;
                if (hours < 8) {
                    hoursClass = 'hours-low';
                    status = 'No quedan horas disponibles';
                } else if (hours <= 39) {
                    hoursClass = 'hours-medium';
                    status = 'Quedan pocas horas disponibles';
                } else {
                    hoursClass = 'hours-high';
                    status = 'Quedan muchas horas disponibles';
                }

                const weekDates   = getWeekDateRange(week);
                const tooltipText = weekDates;

                tableHTML += `
                    <tr>
                        <td class="week-cell" onmouseenter="showTooltip(event, '${tooltipText}')" onmouseleave="hideTooltip()">
                            <strong>Semana ${week}</strong>
                            <div class="week-tooltip">${tooltipText}</div>
                        </td>
                        <td class="hours-cell ${hoursClass}">&nbsp;</td>
                        <td>${status}</td>
                    </tr>
                `;
            });

            tableHTML += `</tbody></table>`;

            document.getElementById('resultsSection').innerHTML = `
                <div class="user-info">${userInfo}</div>
                <div class="table-container">${tableHTML}</div>
            `;
            document.getElementById('resultsSection').style.display = 'block';
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            document.getElementById('loginInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') searchEmployee();
            });
        });

        function getWeekDateRange(weekNumber) {
            const wk1Start = new Date(2025, 11, 28);
            const weekStart = new Date(wk1Start);
            weekStart.setDate(wk1Start.getDate() + (weekNumber - 1) * 7);
            const weekEnd = new Date(weekStart);
            weekEnd.setDate(weekStart.getDate() + 6);
            const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
            return `${weekStart.getDate()} ${months[weekStart.getMonth()]} - ${weekEnd.getDate()} ${months[weekEnd.getMonth()]}`;
        }

        function showTooltip(event, text) {
            const tooltip = event.target.querySelector('.week-tooltip');
            if (tooltip) {
                const rect = event.target.getBoundingClientRect();
                let left = rect.left + rect.width / 2;
                if (left - 60 < 10) left = 70;
                if (left + 60 > window.innerWidth - 10) left = window.innerWidth - 70;
                tooltip.style.position   = 'fixed';
                tooltip.style.left       = left + 'px';
                tooltip.style.top        = rect.top - 10 + 'px';
                tooltip.style.transform  = 'translateX(-50%) translateY(-100%)';
                tooltip.style.opacity    = '1';
                tooltip.style.visibility = 'visible';
                tooltip.style.zIndex     = '9999';
            }
        }

        function hideTooltip() {
            document.querySelectorAll('.week-tooltip').forEach(t => {
                t.style.opacity = '0';
                t.style.visibility = 'hidden';
            });
        }
    </script>
</body>
</html>
